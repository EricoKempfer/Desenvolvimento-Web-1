<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neymar Jr</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Neymar Jr</h1>
<h2>Rei do Drible</h2>

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/bc/Barca_vs_Espanol_2015_%28cropped%29.jpg/800px-Barca_vs_Espanol_2015_%28cropped%29.jpg">

<p class="titulo-comentario">Deixe seu comentário:</p>

<form id="formComentario">

<input
type="text"
id="usuario"
placeholder="Seu nome"
required
>

<input
type="text"
id="comentario"
placeholder="O que você gostaria de comentar?"
required
>

<button type="submit">
Enviar comentário
</button>

</form>

<hr>

<div id="listaComentarios"></div>

<script>

const API_URL = "http://localhost:3000";

function renderizarComentarios(comentarios){

const lista = document.getElementById("listaComentarios");
lista.innerHTML = "";

comentarios.forEach(comentario => {

const divComentario = document.createElement("div");
divComentario.className = "comentario";

divComentario.innerHTML = `

<img src="${comentario.avatar}">

<div class="textoComentario">
<strong>${comentario.usuario}</strong>
<p>${comentario.texto}</p>
</div>

`;

lista.appendChild(divComentario);

});

}

async function carregarComentarios(){

try{

const response = await fetch(`${API_URL}/comentarios`);
const comentarios = await response.json();

renderizarComentarios(comentarios);

}catch(erro){

console.error("Erro ao carregar comentários:", erro);

}

}

document
.getElementById("formComentario")
.addEventListener("submit", async (event)=>{

event.preventDefault();

const usuario = document.getElementById("usuario").value;
const texto = document.getElementById("comentario").value;

try{

const response = await fetch(`${API_URL}/comentarios`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({usuario,texto})

});

if(response.ok){

document.getElementById("comentario").value="";

await carregarComentarios();

}else{

alert("Erro ao enviar comentário");

}

}catch(erro){

console.error("Erro:",erro);
alert("Servidor não está rodando");

}

});

carregarComentarios();

</script>

</body>
</html>
